backend:
  name: github
  repo: CodeSigils/CodeSigils.github.io
  branch: master

media_folder: docs/assets/images
public_folder: /assets/images

media_library:
  config:
    image:
      choose_url: true
      folder: docs/assets/images

site_url: https://codesigils.github.io/

collections:
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "docs"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string", required: false }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
          hint: "Short summary for SEO and previews",
        }
      - {
          label: "Keywords",
          name: "keywords",
          widget: "list",
          required: false,
          hint: "Comma-separated keywords for SEO",
        }
      - {
          label: "Icon",
          name: "icon",
          widget: "string",
          required: false,
          hint: "e.g. lucide/rocket",
        }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "home"
    label: "Homepage"
    files:
      - file: "docs/index.md"
        label: "Home"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - {
              label: "Description",
              name: "description",
              widget: "text",
              required: false,
              hint: "Short summary for SEO",
            }
          - { label: "Icon", name: "icon", widget: "string", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "jsts"
    label: "JS-TS Section"
    folder: "docs/JS-TS"
    create: true
    slug: "{{year}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
          hint: "Short summary for SEO",
        }
      - {
          label: "Keywords",
          name: "keywords",
          widget: "list",
          required: false,
          hint: "Comma-separated keywords for SEO",
        }
      - { label: "Icon", name: "icon", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "ai"
    label: "AI Section"
    folder: "docs/AI"
    create: true
    slug: "{{year}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
          hint: "Short summary for SEO",
        }
      - {
          label: "Keywords",
          name: "keywords",
          widget: "list",
          required: false,
          hint: "Comma-separated keywords for SEO",
        }
      - { label: "Icon", name: "icon", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }